<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Stackline Angular 2 Data Table StackBlitz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <script src="node_modules/core-js/client/shim.min.js"></script>
  <script src="node_modules/zone.js/dist/zone.js"></script>
  <script src="node_modules/reflect-metadata/Reflect.js"></script>
  <script src="node_modules/systemjs/dist/system.src.js"></script>
  <script src="systemjs.config.js"></script>
  <script>
    function showBootError(error) {
      var target = document.getElementById('boot-error');
      document.body.className = 'failed';
      if (target) {
        target.textContent = error && error.stack ? error.stack : String(error);
      }
    }
    window.addEventListener('error', function (event) {
      showBootError(event.error || event.message);
    });
    window.addEventListener('unhandledrejection', function (event) {
      showBootError(event.reason || 'Unhandled promise rejection');
    });
    System.import('app').catch(function (error) {
      console.error(error);
      showBootError(error);
    });
  </script>
</head>
<body>
  <stackline-test>
    <section class="boot-card">Loading Angular 2 data table examples...</section>
  </stackline-test>
  <pre id="boot-error"></pre>
</body>
</html>
